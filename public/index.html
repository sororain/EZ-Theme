<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="icon" href="./images/logo.png">
    <!-- 设置初始标题 -->
    <title><%= htmlWebpackPlugin.options.title %></title>
    <!-- 已移除外部字体，避免首屏阻塞 -->
    <%= typeof injectCustomScript !== 'undefined' ? injectCustomScript : '' %>

    <!-- 全局样式 -->
    <style>
        @media (min-width: 769px) {
            html, body, div, main, section, article, aside, nav {
                scrollbar-width: none !important;
                -ms-overflow-style: none !important;
            }

            ::-webkit-scrollbar, ::-webkit-scrollbar-button, ::-webkit-scrollbar-track, ::-webkit-scrollbar-track-piece, ::-webkit-scrollbar-thumb, ::-webkit-scrollbar-corner, ::-webkit-resizer {
                display: none !important;
                width: 0 !important;
                height: 0 !important;
                background: transparent !important;
            }
        }

        html, body {
            width: 100%;
            height: 100%;
            -webkit-text-size-adjust: none;
            text-size-adjust: none;
        }

        @media (min-width: 769px) {
            * {
                scrollbar-width: none !important;
                -ms-overflow-style: none !important;
            }
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        #app {
            width: 100%;
            height: 100%;
        }

        html.preloader-active,
        html.preloader-active body {
            overflow: hidden !important;
        }

        #app-preloader {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 42%),
                linear-gradient(180deg, #0f1722 0%, #0b1018 100%);
            z-index: 9999;
            opacity: 1;
            visibility: visible;
            font: 400 16px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: none;
            text-size-adjust: none;
            text-rendering: geometricPrecision;
            transition: opacity 0.28s ease, visibility 0.28s ease;
            contain: layout paint style;
        }

        html.preloader-active #app-preloader {
            display: flex;
        }

        #app-preloader,
        #app-preloader * {
            box-sizing: border-box;
        }

        #app-preloader.preloader-exit {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .app-preloader__content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 24px;
            color: rgba(255, 255, 255, 0.92);
            text-align: center;
            transform: translateZ(0);
        }

        .app-preloader__spinner {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.16);
            border-top-color: rgba(255, 255, 255, 0.9);
            animation: app-preloader-spin 0.9s linear infinite;
            box-shadow: 0 0 24px rgba(0, 0, 0, 0.12);
        }

        .app-preloader__title {
            display: block;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.08em;
            line-height: 1;
            transform: translateZ(0);
            white-space: nowrap;
        }

        .app-preloader__text {
            display: block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.64);
            letter-spacing: 0.04em;
            line-height: 1.35;
            transform: translateZ(0);
            white-space: nowrap;
        }

        @keyframes app-preloader-spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
    <!-- 版本号样式 -->
    <style>
        .app-version {
            position: fixed;
            left: 6px;
            bottom: 4px;
            font-size: 9px;
            color: rgba(0, 0, 0, 0.35);
            user-select: none;
            pointer-events: none;
            z-index: 5;
        }
    </style>
    <script>
        (function () {
            var shouldShowPreloader = true;

            try {
                if (window.sessionStorage.getItem('ez-theme-first-screen-seen') === '1') {
                    shouldShowPreloader = false;
                } else {
                    window.sessionStorage.setItem('ez-theme-first-screen-seen', '1');
                }
            } catch (error) {
                shouldShowPreloader = true;
            }

            window.__SHOW_APP_PRELOADER__ = shouldShowPreloader;

            if (shouldShowPreloader) {
                document.documentElement.classList.add('preloader-active');

                // 兜底：2秒后自动隐藏预加载器并刷新页面
                window.setTimeout(function () {
                    var el = document.getElementById('app-preloader');
                    if (el && !el.classList.contains('preloader-exit')) {
                        el.classList.add('preloader-exit');
                        document.documentElement.classList.remove('preloader-active');
                        window.setTimeout(function () {
                            el.remove();
                            window.location.reload();
                        }, 320);
                    }
                }, 2000);
            }
        })();
    </script>

</head>
<body>
<div id="app-preloader" aria-live="polite">
    <div class="app-preloader__content">
        <div class="app-preloader__spinner"></div>
        <div class="app-preloader__title">Loading</div>
        <div class="app-preloader__text">页面正在准备中...</div>
    </div>
</div>
<div id="app"></div>
<!-- built files will be auto injected -->
<!-- 隐藏版本号；若不想显示版本号，请注释下方 div 标签 -->
<div class="app-version">v0.3.9</div>
</body>
</html>
